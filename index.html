<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Árvore Genealógica</title>
<script>
  // Auto-detect mobile and redirect
  (function(){
    var isMobile = /Mobi|Android|iPhone|iPad|iPod|Opera Mini|IEMobile|BlackBerry/i.test(navigator.userAgent);
    var isSmallScreen = window.innerWidth < 900;
    var target = (isMobile || isSmallScreen) ? 'mobile.html' : 'desktop.html';
    // Allow manual override via ?view=desktop or ?view=mobile
    var params = new URLSearchParams(window.location.search);
    var view = params.get('view');
    if(view === 'desktop') target = 'desktop.html';
    if(view === 'mobile') target = 'mobile.html';
    window.location.replace(target);
  })();
</script>
<style>
  body{
    margin:0;padding:0;background:#0f1117;color:#e8eaed;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;text-align:center;
  }
  .loading{padding:40px}
  .spinner{
    width:40px;height:40px;border:3px solid #2d3348;
    border-top-color:#6366f1;border-radius:50%;
    animation:spin 1s linear infinite;margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:18px;font-weight:600;margin-bottom:8px}
  p{font-size:13px;color:#9aa0b0;margin-bottom:16px}
  .links a{
    color:#6366f1;text-decoration:none;font-size:12px;
    padding:8px 14px;background:#1a1d27;border-radius:8px;
    margin:0 4px;display:inline-block;
  }
</style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <h1>🌳 Árvore Genealógica</h1>
  <p>Carregando...</p>
  <div class="links">
    <a href="mobile.html">📱 Mobile</a>
    <a href="desktop.html">🖥️ Desktop</a>
  </div>
</div>
</body>
</html>
