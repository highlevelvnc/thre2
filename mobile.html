<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<title>Arvore Genealogica - Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--card:#222636;--card-hover:#2a2f42;
  --txt:#e8eaed;--txt2:#9aa0b0;--txt3:#6b7280;
  --border:#2d3348;--accent:#6366f1;
  --paterno:#3b82f6;--paterno-bg:rgba(59,130,246,0.12);--paterno-dark:#1e3a8a;
  --materno:#ec4899;--materno-bg:rgba(236,72,153,0.12);--materno-dark:#831843;
  --voce:#a855f7;--voce-bg:rgba(168,85,247,0.12);--voce-dark:#581c87;
  --br:#22c55e;--pt:#ef4444;
}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;padding-bottom:80px;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.title{font-size:17px;font-weight:700;color:var(--txt)}
.subtitle{font-size:11px;color:var(--txt2);margin-top:2px}
.stats{font-size:11px;color:var(--txt3);padding:4px 10px;background:var(--card);border-radius:20px}

/* Search */
.search{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;
}
.search input{
  flex:1;background:none;border:none;color:var(--txt);
  font-size:14px;font-family:inherit;outline:none;
}
.search input::placeholder{color:var(--txt3)}

/* ===== TABS ===== */
.tabs{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
  padding:10px 12px 0;background:var(--bg);
  position:sticky;top:110px;z-index:90;
}
.tab{
  padding:10px 8px;border:none;background:var(--card);color:var(--txt2);
  font-family:inherit;font-size:12px;font-weight:600;
  border-radius:10px;cursor:pointer;
  transition:all .2s;border:2px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tab-icon{font-size:18px}
.tab-count{font-size:10px;opacity:.7}
.tab.active[data-tab="paterno"]{border-color:var(--paterno);background:var(--paterno-bg);color:var(--paterno)}
.tab.active[data-tab="materno"]{border-color:var(--materno);background:var(--materno-bg);color:var(--materno)}
.tab.active[data-tab="voce"]{border-color:var(--voce);background:var(--voce-bg);color:var(--voce)}

/* ===== CONTENT ===== */
main{padding:16px 12px 40px}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.panel-header{
  text-align:center;padding:12px 0 20px;
}
.panel-header h2{font-size:22px;font-weight:800;margin-bottom:4px}
.panel-header p{font-size:12px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px}
.panel[data-panel="paterno"] h2{color:var(--paterno)}
.panel[data-panel="materno"] h2{color:var(--materno)}
.panel[data-panel="voce"] h2{color:var(--voce)}

/* ===== GENERATION ===== */
.gen{margin-bottom:28px}
.gen-label{
  font-size:10px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:2px;
  padding:6px 12px;background:var(--card);border-radius:20px;
  display:inline-block;margin-bottom:10px;
}
.gen-divider{
  height:1px;background:var(--border);margin:24px 0;position:relative;
}
.gen-divider::after{
  content:'';position:absolute;left:50%;top:-4px;
  width:8px;height:8px;border-radius:50%;
  background:var(--border);transform:translateX(-50%);
}

/* ===== COUPLE ===== */
.couple{
  display:flex;gap:8px;margin-bottom:12px;
  align-items:stretch;position:relative;
}
.couple-link{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:14px;color:#f59e0b;
  background:var(--bg);padding:2px 6px;border-radius:10px;
  z-index:2;pointer-events:none;
}

/* ===== CARD ===== */
.card{
  flex:1;background:var(--card);border:2px solid var(--border);
  border-radius:14px;padding:12px;cursor:pointer;
  transition:transform .15s,border-color .15s;
  position:relative;min-width:0;
}
.card:active{transform:scale(0.98)}
.card.paterno{border-left:4px solid var(--paterno)}
.card.materno{border-left:4px solid var(--materno)}
.card.voce{border-left:4px solid var(--voce)}

.card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;flex-shrink:0;
}
.avatar.M{background:rgba(59,130,246,0.2);color:#93c5fd}
.avatar.F{background:rgba(236,72,153,0.2);color:#f9a8d4}

.card-info{flex:1;min-width:0}
.name{
  font-size:13px;font-weight:700;line-height:1.25;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.sub{
  font-size:11px;color:var(--txt2);margin-top:2px;
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
}
.flag{font-size:10px}
.dates{font-size:10px;color:var(--txt3);margin-top:6px}
.place{
  font-size:10px;color:var(--txt3);margin-top:4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Nationality bar */
.nat-pt{background:linear-gradient(135deg,rgba(239,68,68,0.08),var(--card))!important}
.nat-br{background:linear-gradient(135deg,rgba(34,197,94,0.08),var(--card))!important}

/* ===== DETAIL MODAL ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);z-index:1000;
  display:none;align-items:flex-end;
}
.modal.show{display:flex;animation:fadeIn .2s}
.modal-inner{
  background:var(--bg2);border-radius:20px 20px 0 0;
  width:100%;max-height:85vh;overflow-y:auto;
  padding:24px 20px 40px;position:relative;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{
  width:40px;height:4px;background:var(--border);border-radius:2px;
  margin:0 auto 20px;
}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:var(--card);border:none;color:var(--txt);
  font-size:20px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;
}
.modal-avatar{
  width:72px;height:72px;margin:0 auto 14px;
  border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:28px;font-weight:800;
}
.modal h2{text-align:center;font-size:20px;margin-bottom:8px}
.modal-badges{display:flex;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.badge{
  font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600;
}
.badge.pt{background:rgba(239,68,68,0.15);color:#fca5a5}
.badge.br{background:rgba(34,197,94,0.15);color:#86efac}
.badge.paterno{background:var(--paterno-bg);color:var(--paterno)}
.badge.materno{background:var(--materno-bg);color:var(--materno)}
.badge.voce{background:var(--voce-bg);color:var(--voce)}

.modal-section{margin-bottom:18px}
.modal-section-title{
  font-size:10px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;
}
.modal-row{
  display:flex;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.modal-row:last-child{border:none}
.modal-row-label{color:var(--txt2);min-width:90px;font-size:12px}
.modal-row-value{flex:1;color:var(--txt)}
.notes-box{
  background:var(--card);padding:12px;border-radius:10px;
  font-size:12px;color:var(--txt2);line-height:1.5;
  white-space:pre-wrap;
}
.relation-list{display:flex;flex-wrap:wrap;gap:6px}
.rel-chip{
  background:var(--card);padding:6px 10px;border-radius:10px;
  font-size:12px;cursor:pointer;border:1px solid var(--border);
  transition:all .15s;
}
.rel-chip:active{transform:scale(0.95)}
.rel-chip.paterno{border-color:var(--paterno);color:#93c5fd}
.rel-chip.materno{border-color:var(--materno);color:#f9a8d4}
.rel-chip.voce{border-color:var(--voce);color:#d8b4fe}

/* ===== FLOATING ACTION ===== */
.fab{
  position:fixed;bottom:20px;right:20px;z-index:90;
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:white;border:none;
  font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px rgba(99,102,241,0.4);
  display:flex;align-items:center;justify-content:center;
}

/* ===== DESKTOP ===== */
@media(min-width:768px){
  body{max-width:900px;margin:0 auto;background:var(--bg)}
  .panel[data-panel]{padding:0 20px}
  .couple{gap:14px}
  .card{padding:16px}
  .name{font-size:14px}
  .tabs{top:120px}
}

/* ===== SEARCH HIGHLIGHT ===== */
.card.search-hidden{display:none}
.card.search-match{box-shadow:0 0 0 2px var(--accent)}

/* ===== TIMELINE ===== */
.timeline{
  position:relative;padding-left:20px;
}
.timeline::before{
  content:'';position:absolute;left:6px;top:12px;bottom:0;
  width:2px;background:var(--border);border-radius:1px;
}
.timeline-dot{
  position:absolute;left:0;width:14px;height:14px;
  border-radius:50%;background:var(--card);
  border:2px solid var(--border);margin-top:12px;
}
.panel[data-panel="paterno"] .timeline-dot{border-color:var(--paterno)}
.panel[data-panel="materno"] .timeline-dot{border-color:var(--materno)}
.panel[data-panel="voce"] .timeline-dot{border-color:var(--voce)}

/* Scroll anchor indicator */
.legend-row{
  display:flex;gap:12px;justify-content:center;
  flex-wrap:wrap;font-size:10px;color:var(--txt3);
  padding:8px 0;
}
.legend-row span{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="title">🌳 Árvore Genealógica</div>
      <div class="subtitle">Família Silva · Angelo · Oliveira · Thiago</div>
    </div>
    <div class="stats" id="stats">0 pessoas</div>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--txt3)">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar por nome...">
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="paterno">
    <span class="tab-icon">🔵</span>
    <span>Paterno</span>
    <span class="tab-count" id="count-paterno">0</span>
  </button>
  <button class="tab" data-tab="materno">
    <span class="tab-icon">🟣</span>
    <span>Materno</span>
    <span class="tab-count" id="count-materno">0</span>
  </button>
  <button class="tab" data-tab="voce">
    <span class="tab-icon">👤</span>
    <span>Você</span>
    <span class="tab-count" id="count-voce">0</span>
  </button>
</nav>

<div class="legend-row">
  <span><span class="legend-dot" style="background:#ef4444"></span>🇵🇹 Português</span>
  <span><span class="legend-dot" style="background:#22c55e"></span>🇧🇷 Brasileiro</span>
</div>

<main>
  <div class="panel active" data-panel="paterno">
    <div class="panel-header">
      <h2>🔵 Família Paterna</h2>
      <p>Jorge Fernando · Nilcea · Xavier · Souza · Aguiar</p>
    </div>
    <div id="content-paterno"></div>
  </div>

  <div class="panel" data-panel="materno">
    <div class="panel-header">
      <h2>🟣 Família Materna</h2>
      <p>Patricia · Oliveira · Guimarães · Thiago Outeiro 🇵🇹</p>
    </div>
    <div id="content-materno"></div>
  </div>

  <div class="panel" data-panel="voce">
    <div class="panel-header">
      <h2>👤 Você & Filhas</h2>
      <p>Vinicius · Jade · Clara</p>
    </div>
    <div id="content-voce"></div>
  </div>
</main>

<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Voltar ao topo">↑</button>

<!-- Detail Modal -->
<div class="modal" id="modal">
  <div class="modal-inner" id="modal-inner">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ============ DATA ============
let TREE = {members:{},nextId:200};
const VOCE_ID = 'p249'; // Vinicius

// Fetch the JSON
fetch('arvore_atualizada.json')
  .then(r=>r.json())
  .then(data=>{TREE=data;render()})
  .catch(()=>{
    // Fallback: try embedded data or show error
    document.querySelector('main').innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt2)"><p>⚠️ Não foi possível carregar arvore_atualizada.json</p><p style="font-size:12px;margin-top:10px">Certifique-se que o arquivo está na mesma pasta.</p></div>';
  });

function p(id){return TREE.members[id]}
function children(id){return (p(id)?.childrenIds||[]).map(p).filter(Boolean)}
function parents(id){return (p(id)?.parentIds||[]).map(p).filter(Boolean)}
function spouse(id){const x=p(id);return x?.spouseId?p(x.spouseId):null}
function initials(n){return n.split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function age(b,d){if(!b)return'';const y=d?new Date(d).getFullYear()-new Date(b).getFullYear():'';return d?` (${y}a)`:''}
function fmtDate(d){if(!d)return'';const x=new Date(d);return x.getDate()+'/'+(x.getMonth()+1)+'/'+x.getFullYear()}
function flag(nat){return nat==='PT'?'🇵🇹':nat==='BR'?'🇧🇷':''}

// ============ SIDE CLASSIFICATION ============
// Paternal: Jorge Fernando (p241) and all ancestors
// Maternal: Patricia (p243) and all ancestors (including Portuguese line)
// Voce: Vinicius (p249), Jade, Clara

function classifySides(){
  const sides = {paterno:new Set(), materno:new Set(), voce:new Set()};
  // Vinicius + descendants
  const voceIds = [VOCE_ID];
  function addDesc(id){(p(id)?.childrenIds||[]).forEach(c=>{voceIds.push(c);addDesc(c)})}
  addDesc(VOCE_ID);
  voceIds.forEach(id=>sides.voce.add(id));

  // Paternal: start from Fernando (p244 - pai do Vinicius), climb up
  // Walk up parent chain ONLY (no spouse recursion to avoid cross-contamination)
  function addAnc(id, side){
    if(!id||sides[side].has(id)||sides.voce.has(id))return;
    sides[side].add(id);
    (p(id)?.parentIds||[]).forEach(pid=>addAnc(pid,side));
  }
  // After adding all ancestors, add siblings + their spouses at each level
  function addSiblingsAndSpouses(side){
    const toAdd = new Set();
    sides[side].forEach(id=>{
      // Spouse (if not in voce or other side)
      const sp = p(id)?.spouseId;
      if(sp && !sides.voce.has(sp) && !sides[side==='paterno'?'materno':'paterno'].has(sp)) toAdd.add(sp);
      // Siblings
      (p(id)?.parentIds||[]).forEach(pid=>{
        (p(pid)?.childrenIds||[]).forEach(sid=>{
          if(sid!==id && !sides.voce.has(sid) && !sides[side==='paterno'?'materno':'paterno'].has(sid)) toAdd.add(sid);
        });
      });
    });
    toAdd.forEach(id=>sides[side].add(id));
  }
  addAnc('p244','paterno'); // Fernando
  addAnc('p243','materno'); // Patricia
  addSiblingsAndSpouses('paterno');
  addSiblingsAndSpouses('materno');
  return sides;
}

// ============ LAYOUT: GENERATION GROUPING ============
function groupByGeneration(ids){
  // Distance from Vinicius
  const dist = {};
  function walkUp(id, d){
    if(dist[id]!==undefined && dist[id]<=d)return;
    dist[id]=d;
    (p(id)?.parentIds||[]).forEach(pid=>walkUp(pid,d+1));
  }
  function walkDown(id, d){
    if(dist[id]!==undefined && dist[id]<=d)return;
    dist[id]=d;
    (p(id)?.childrenIds||[]).forEach(cid=>walkDown(cid,d-1));
  }
  walkUp(VOCE_ID,0);
  walkDown(VOCE_ID,0);
  // Multi-pass resolution for siblings/spouses/in-laws without direct path
  for(let pass=0;pass<3;pass++){
    ids.forEach(id=>{
      if(dist[id]!==undefined)return;
      const person=p(id);if(!person)return;
      // 1) Try siblings (share parents with known person)
      for(const pid of (person.parentIds||[])){
        for(const sid of (p(pid)?.childrenIds||[])){
          if(sid!==id && dist[sid]!==undefined){dist[id]=dist[sid];return}
        }
      }
      // 2) Try spouse
      if(person.spouseId && dist[person.spouseId]!==undefined){dist[id]=dist[person.spouseId];return}
      // 3) Try via children
      for(const kid of (person.childrenIds||[])){
        if(dist[kid]!==undefined){dist[id]=dist[kid]+1;return}
      }
    });
  }
  ids.forEach(id=>{if(dist[id]===undefined)dist[id]=99});
  const groups = {};
  ids.forEach(id=>{
    const g=dist[id]??99;
    (groups[g]=groups[g]||[]).push(id);
  });
  return groups;
}

const GEN_LABELS = {
  '-1':'👶 FILHAS (Netas)','0':'⭐ VOCÊ','1':'👨‍👩‍👧 PAIS',
  '2':'👴 AVÓS','3':'🏛️ BISAVÓS (Gen 3)','4':'📜 TRISAVÓS (Gen 4)',
  '5':'🌿 TETRAVÓS (Gen 5)','6':'🌳 PENTAVÓS (Gen 6)',
  '7':'🏔️ HEXAVÓS (Gen 7)','8':'⛰️ HEPTAVÓS (Gen 8)','9':'🗻 OCTAVÓS (Gen 9)',
  '99':'❓ OUTROS'
};

// ============ RENDER ============
function render(){
  const sides = classifySides();
  document.getElementById('stats').textContent = Object.keys(TREE.members).length + ' pessoas';
  document.getElementById('count-paterno').textContent = sides.paterno.size;
  document.getElementById('count-materno').textContent = sides.materno.size;
  document.getElementById('count-voce').textContent = sides.voce.size;

  ['paterno','materno','voce'].forEach(side=>{
    const ids = Array.from(sides[side]);
    const groups = groupByGeneration(ids);
    const container = document.getElementById('content-'+side);
    container.innerHTML = '';
    // For ancestor panels (paterno/materno): OLDEST FIRST (highest gen number at top)
    // For voce: Vinicius first, then descendants below
    const keys = Object.keys(groups).map(Number).sort((a,b)=>side==='voce'?b-a:b-a);
    keys.forEach(gen=>{
      const section = document.createElement('section');
      section.className='gen';
      const label = GEN_LABELS[gen]||`Gen ${gen}`;
      section.innerHTML=`<div class="gen-label">${label}</div>`;
      // Pair couples: iterate through the list and group by spouse
      const ppl = groups[gen];
      const seen = new Set();
      ppl.forEach(id=>{
        if(seen.has(id))return;
        const person=p(id);if(!person)return;seen.add(id);
        const sp = person.spouseId && ids.includes(person.spouseId) ? p(person.spouseId) : null;
        if(sp)seen.add(sp.id);
        section.appendChild(makeCouple(person, sp, side));
      });
      container.appendChild(section);
    });
    if(container.innerHTML===''){
      container.innerHTML='<p style="text-align:center;color:var(--txt3);padding:40px 20px">Nenhum membro neste lado.</p>';
    }
  });

  // Search
  document.getElementById('search').addEventListener('input', doSearch);
}

function makeCouple(a, b, side){
  const div = document.createElement('div');
  div.className = b ? 'couple' : 'gen';
  div.appendChild(makeCard(a, side));
  if(b){
    const link = document.createElement('span');
    link.className = 'couple-link';
    link.textContent = '💍';
    div.appendChild(link);
    div.appendChild(makeCard(b, side));
  }
  return div;
}

function makeCard(person, side){
  const c = document.createElement('div');
  c.className = `card ${side} nat-${(person.nationality||'').toLowerCase()}`;
  c.dataset.id = person.id;
  c.dataset.name = person.name.toLowerCase();
  c.onclick = ()=>openModal(person.id, side);
  const birth = person.birthDate ? fmtDate(person.birthDate) : '';
  const death = person.deathDate ? ' – ' + fmtDate(person.deathDate) : '';
  const dates = (birth||death) ? `<div class="dates">${birth}${death}${age(person.birthDate,person.deathDate)}</div>` : '';
  const place = person.birthPlace ? `<div class="place">📍 ${person.birthPlace}</div>` : '';
  c.innerHTML = `
    <div class="card-top">
      <div class="avatar ${person.gender}">${initials(person.name)}</div>
      <div class="card-info">
        <div class="name">${person.name}</div>
        <div class="sub">
          ${flag(person.nationality) ? `<span class="flag">${flag(person.nationality)}</span>`:''}
          <span>${person.gender==='M'?'♂':'♀'}</span>
        </div>
      </div>
    </div>
    ${dates}${place}
  `;
  return c;
}

// ============ MODAL ============
function openModal(id, side){
  const person = p(id); if(!person) return;
  const sp = spouse(id);
  const kids = children(id);
  const pars = parents(id);

  const birth = person.birthDate ? fmtDate(person.birthDate) : '—';
  const death = person.deathDate ? fmtDate(person.deathDate) : '';

  const chip = (prs, s) => prs.map(x=>`<span class="rel-chip ${s}" onclick="openModal('${x.id}','${s}')">${x.name}</span>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-avatar avatar ${person.gender}">${initials(person.name)}</div>
    <h2>${person.name}</h2>
    <div class="modal-badges">
      ${person.nationality==='PT'?'<span class="badge pt">🇵🇹 Português</span>':''}
      ${person.nationality==='BR'?'<span class="badge br">🇧🇷 Brasileiro</span>':''}
      <span class="badge ${side}">${side==='paterno'?'Paterno':side==='materno'?'Materno':'Você'}</span>
    </div>
    <div class="modal-section">
      <div class="modal-row"><span class="modal-row-label">Gênero</span><span class="modal-row-value">${person.gender==='M'?'Masculino ♂':'Feminino ♀'}</span></div>
      <div class="modal-row"><span class="modal-row-label">Nascimento</span><span class="modal-row-value">${birth}</span></div>
      ${death?`<div class="modal-row"><span class="modal-row-label">Falecimento</span><span class="modal-row-value">${death}</span></div>`:''}
      ${person.birthPlace?`<div class="modal-row"><span class="modal-row-label">Local</span><span class="modal-row-value">${person.birthPlace}</span></div>`:''}
    </div>
    ${sp?`<div class="modal-section"><div class="modal-section-title">Cônjuge</div><div class="relation-list">${chip([sp],side)}</div></div>`:''}
    ${pars.length?`<div class="modal-section"><div class="modal-section-title">Pais</div><div class="relation-list">${chip(pars,side)}</div></div>`:''}
    ${kids.length?`<div class="modal-section"><div class="modal-section-title">Filhos (${kids.length})</div><div class="relation-list">${chip(kids,side)}</div></div>`:''}
    ${person.notes?`<div class="modal-section"><div class="modal-section-title">Observações</div><div class="notes-box">${person.notes}</div></div>`:''}
  `;
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target.id==='modal')closeModal();
});

// ============ TABS ============
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.querySelector(`.panel[data-panel="${t.dataset.tab}"]`).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  };
});

// ============ SEARCH ============
function doSearch(e){
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c=>{
    const match = !q || c.dataset.name.includes(q);
    c.classList.toggle('search-hidden', !match);
    c.classList.toggle('search-match', match && q);
  });
}

// Close modal on back button
window.addEventListener('popstate',closeModal);
</script>
</body>
</html>
